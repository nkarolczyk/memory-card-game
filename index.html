<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game - Natalia Karolczyk</title>
<link rel="stylesheet" href="style.css">
<link rel="shortcut icon" href="ikona.webp" type="image/x-icon">
</head>
<body>
    <div id="startScreen" class="start-screen">
        <h1>MEMORY CARD GAME</h1>
        <p>Witaj w grze! Naciśnij Start, aby rozpocząć.</p>
        <button id="startButton">Start</button>
    </div>
    
    <div id="infoContainer">
        <p id="timerDisplay">Czas: 0 sekund</p>
        <p id="attemptsDisplay">Próby: 0</p>
    </div>
    <div id="game" class="game-container"></div>
    <script src="script.js"></script>
</body>
</html>
